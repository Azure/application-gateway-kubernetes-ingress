name: "Trivy Vulnerability Scanner"

on:
  workflow_dispatch:
  # push:
    # branches:
    # - master
    # - release/*
  # pull_request:
    # branches:
    # - master
    # - release/*
  # schedule:
    # - cron: '0 0 * * *'  # Runs every 24 hours at midnight UTC

permissions:
  actions: read
  contents: read
  deployments: read

jobs:
  trivy_vulnerability_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    env:
      BUILD_TAG: latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Get Go version from Makefile
      id: go-version
      run: |
        GO_VERSION=$(make -s print-go-version)
        if [ -z "$GO_VERSION" ]; then echo "Failed to get Go version" && exit 1; fi
        echo "version=$GO_VERSION" >> "$GITHUB_OUTPUT"

    - name: Set up Go
      uses: actions/setup-go@v5.0.1
      with:
        go-version: "${{ steps.go-version.outputs.version }}"
    - name: Build AGIC docker image
      run: make build-image

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # Uses pinned SHA of v0.35.0
      with:
        image-ref: 'appgwreg.azurecr.io/public/azure-application-gateway/kubernetes-ingress-staging:latest'
        format: 'json'
        output: 'trivy-results.json'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Convert JSON to SARIF
      if: always()
      run: trivy convert --format sarif -o trivy-results.sarif trivy-results.json

    - name: Convert JSON to Table Format
      if: always()
      run: trivy convert --format table trivy-results.json

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3.28.2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
